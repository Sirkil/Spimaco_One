<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Relief Rush</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-bg: #111a28;
            --glass-bg: rgba(25, 40, 60, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #4facfe;
            --neon-green: #2ecc71;
            --neon-red: #ff4757;
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Mobile Responsive Game Container */
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 900px;
            background-color: var(--primary-bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Screen Management */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            z-index: 1;
            background-size: cover;
            background-position: center;
        }

        .screen.active {
            display: flex;
        }

        /* --- Start Screen --- */
        #start-screen {
            background: linear-gradient(to bottom, #1a2a6c, #112b3c, #203a43);
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .game-logo-large {
            width: 200px;
            margin-bottom: 20px;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(135deg, var(--neon-blue), #00f2fe);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.5);
            transition: transform 0.1s;
        }
        
        .start-btn:active, .restart-btn:active {
            transform: scale(0.95);
        }

        /* --- Main Game Screen --- */
        #game-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1b2838 0%, #0d141e 100%);
            z-index: 0;
        }

        .game-ui {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Pushes timer to the right */
            margin-bottom: 20px;
        }

        .game-title {
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.1;
        }

        .timer-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
            transition: all 0.3s ease;
        }
        
        .timer-circle span {
            font-size: 0.7rem;
            font-weight: normal;
            margin-top: -5px;
        }

        /* Penalty animation for the timer */
        @keyframes flashRed {
            0% { border-color: var(--neon-red); color: var(--neon-red); transform: scale(1.1); box-shadow: 0 0 15px var(--neon-red); }
            100% { border-color: var(--neon-blue); color: white; transform: scale(1); box-shadow: 0 0 10px rgba(79, 172, 254, 0.5); }
        }
        .timer-penalty {
            animation: flashRed 0.5s ease;
        }

        /* --- Matching Area --- */
        .match-area {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            padding: 10px 0;
        }

        /* SVG Overlay for drawing lines */
        #connection-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to buttons */
            z-index: 1;
        }

        .col {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 38%; /* Adjusted for more space in the middle */
            z-index: 2;
        }

        .match-item {
            background: var(--glass-bg);
            border: 2px solid transparent;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .match-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .match-item .label {
            padding: 8px 5px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0,0,0,0.4);
        }

        .match-item.selected {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            transform: scale(1.05);
        }

        .match-item.matched {
            opacity: 0.7;
            pointer-events: none;
            border-color: var(--neon-green);
        }

        .right-col .match-item img {
            object-fit: contain;
            padding: 10px;
            background: #e0e0e0;
        }

        /* --- End Screens --- */
        .result-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
            width: 80%;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #success-screen {
            background: url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80') center/cover;
            justify-content: center;
            align-items: center;
        }

        #fail-screen {
            background: rgba(17, 26, 40, 0.95);
            justify-content: center;
            align-items: center;
        }

        .fail-box {
            background: #1e1111;
            border: 1px solid rgba(255, 71, 87, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .icon-large {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        .icon-success {
            color: var(--neon-green);
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }

        .icon-fail {
            color: #ff6b81;
            border: 3px solid var(--neon-red);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.5);
        }

        .result-text {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-subtext {
            color: #ccc;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .top-logo {
            width: 200px;
        }

    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="start-screen" class="screen active">
            <img src="https://via.placeholder.com/200x100.png?text=LOGO" alt="Game Logo" class="game-logo-large">
            <h1 style="color: white; margin-bottom: 10px;">Family Relief Rush</h1>
            <p style="color: #ccc; font-size: 0.9rem; line-height: 1.4;">
                Match the patient's condition to the correct relief medication.<br>Careful: Wrong matches cost 10 seconds!
            </p>
            <button class="start-btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="main-screen" class="screen">
            <div id="game-bg"></div>
            
            <div class="game-ui">
                <header>
                    <img src="assets/Asset 1.png" alt="Spimaco" class="top-logo">
                    <div class="timer-circle" id="timer-container">
                        <div id="timer-display">60</div>
                        <span>sec</span>
                    </div>
                </header>

                <div class="match-area">
                    <svg id="connection-lines"></svg>
                    
                    <div class="col left-col" id="left-col">
                        </div>

                    <div class="col right-col" id="right-col">
                        </div>
                </div>
            </div>
        </div>

        <div id="success-screen" class="screen">
            <div class="result-box">
                <div class="icon-large icon-success">✔️</div>
                <div class="result-text">You are eligible to take this station badge</div>
                <button class="restart-btn" onclick="resetGameToStart()">Finish</button>
            </div>
        </div>

        <div id="fail-screen" class="screen">
            <div class="result-box fail-box">
                <div class="icon-large icon-fail">❌</div>
                <div class="result-text">Time's Up!</div>
                <div class="result-subtext">You ran out of time before finishing the matches.</div>
                <button class="restart-btn" style="background: #e74c3c; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.5); width: 100%; border-radius: 20px;" onclick="resetGameToStart()">Restart Game</button>
            </div>
        </div>

    </div>

    <script>
        /* --- GAME DATA & CONFIGURATION --- */
        const leftItems = [
            { id: 'l1', matchId: 'fever', label: 'Child with Fever', img: 'https://images.unsplash.com/photo-1584824486516-0555a07fc511?auto=format&fit=crop&q=80&w=200' },
            { id: 'l2', matchId: 'headache', label: 'Mother with Headache', img: 'https://images.unsplash.com/photo-1507206130118-b5907f817163?auto=format&fit=crop&q=80&w=200' },
            { id: 'l3', matchId: 'bodypain', label: 'Person with Body Pain', img: 'https://images.unsplash.com/photo-1554620158-7da56434ec98?auto=format&fit=crop&q=80&w=200' },
            { id: 'l4', matchId: 'busy', label: 'Busy Family Interruption', img: 'https://images.unsplash.com/photo-1600880292089-90a7e086ee3c?auto=format&fit=crop&q=80&w=200' },
            { id: 'l5', matchId: 'running nose', label: 'Running Nose', img: 'https://images.unsplash.com/photo-1600880292089-90a7e086ee3c?auto=format&fit=crop&q=80&w=200' }
        ];

        const rightItems = [
            { id: 'r1', matchId: 'headache', label: 'Fevadol 500 MG', img: 'assets/fevadol.png' },
            { id: 'r2', matchId: 'fever', label: 'Fevadol Plus', img: 'assets/fevadol_plus.png' },
            { id: 'r3', matchId: 'busy', label: 'Fevadol Fast', img: 'assets/fevadol_fast.png' },
            { id: 'r4', matchId: 'bodypain', label: 'Fevadol Extra', img: 'assets/fevadol_extra.png' },
            { id: 'r5', matchId: 'running nose', label: 'Fevadol Cold & Flu', img: 'assets/fevado_cold&flu.png' },
        ];

        /* --- GAME STATE --- */
        let timerInterval;
        let timeLeft = 60;
        let selectedLeftItem = null;
        let matchedPairsCount = 0;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            resetGameState();
            renderGrid();
            showScreen('main-screen');
            
            // Start Timer
            timeLeft = 60;
            updateTimerDisplay();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showEndScreen(false);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timer-display');
            display.innerText = timeLeft > 0 ? timeLeft : 0;
        }

        function resetGameState() {
            selectedLeftItem = null;
            matchedPairsCount = 0;
            document.getElementById('connection-lines').innerHTML = ''; 
            document.getElementById('timer-container').classList.remove('timer-penalty');
        }

        function renderGrid() {
            const leftCol = document.getElementById('left-col');
            const rightCol = document.getElementById('right-col');
            
            leftCol.innerHTML = '';
            rightCol.innerHTML = '';

            leftItems.forEach(item => {
                const el = document.createElement('div');
                el.className = 'match-item left-item';
                el.id = item.id;
                el.dataset.matchId = item.matchId;
                el.innerHTML = `<img src="${item.img}" alt="${item.label}"><div class="label">${item.label}</div>`;
                el.onclick = () => handleLeftClick(el);
                leftCol.appendChild(el);
            });

            rightItems.forEach(item => {
                const el = document.createElement('div');
                el.className = 'match-item right-item';
                el.id = item.id;
                el.dataset.matchId = item.matchId;
                el.innerHTML = `<img src="${item.img}" alt="${item.label}"><div class="label">${item.label}</div>`;
                el.onclick = () => handleRightClick(el);
                rightCol.appendChild(el);
            });
        }

        function handleLeftClick(el) {
            if (el.classList.contains('matched')) return;
            document.querySelectorAll('.left-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            selectedLeftItem = el;
        }

        function handleRightClick(rightEl) {
            if (rightEl.classList.contains('matched') || !selectedLeftItem) return;

            const leftMatchId = selectedLeftItem.dataset.matchId;
            const rightMatchId = rightEl.dataset.matchId;

            if (leftMatchId === rightMatchId) {
                // --- CORRECT MATCH ---
                drawLine(selectedLeftItem, rightEl, true);
                
                selectedLeftItem.classList.remove('selected');
                selectedLeftItem.classList.add('matched');
                rightEl.classList.add('matched');
                
                selectedLeftItem = null;
                matchedPairsCount++;

                if (matchedPairsCount === leftItems.length) {
                    setTimeout(() => {
                        clearInterval(timerInterval);
                        showEndScreen(true);
                    }, 500);
                }
            } else {
                // --- INCORRECT MATCH ---
                drawLine(selectedLeftItem, rightEl, false);
                
                // Unselect the left item so they have to try again
                selectedLeftItem.classList.remove('selected');
                selectedLeftItem = null;

                // Deduct Time
                timeLeft -= 10;
                updateTimerDisplay();

                // Trigger Penalty Animation
                const timerContainer = document.getElementById('timer-container');
                timerContainer.classList.remove('timer-penalty');
                void timerContainer.offsetWidth; // Force CSS reflow to restart animation
                timerContainer.classList.add('timer-penalty');

                // Check if they died from the penalty
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    setTimeout(() => showEndScreen(false), 500);
                }
            }
        }

        function drawLine(el1, el2, isCorrect) {
            const svg = document.getElementById('connection-lines');
            const svgRect = svg.getBoundingClientRect();
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();

            const startX = rect1.right - svgRect.left;
            const startY = (rect1.top + rect1.bottom) / 2 - svgRect.top;
            
            const endX = rect2.left - svgRect.left;
            const endY = (rect2.top + rect2.bottom) / 2 - svgRect.top;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            
            const controlPointOffset = 50;
            const d = `M ${startX} ${startY} C ${startX + controlPointOffset} ${startY}, ${endX - controlPointOffset} ${endY}, ${endX} ${endY}`;
            
            // Choose color based on whether the match was correct
            const lineColor = isCorrect ? "#4facfe" : "#ff4757"; 
            
            path.setAttribute("d", d);
            path.setAttribute("stroke", lineColor);
            path.setAttribute("stroke-width", "3");
            path.setAttribute("fill", "none");
            path.style.filter = `drop-shadow(0 0 5px ${lineColor})`;
            
            svg.appendChild(path);

            // If incorrect, make the red line disappear after a moment
            if (!isCorrect) {
                setTimeout(() => {
                    if (path.parentNode) {
                        svg.removeChild(path);
                    }
                }, 800);
            }
        }

        function showEndScreen(isSuccess) {
            if (isSuccess) {
                showScreen('success-screen');
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#2ecc71', '#4facfe', '#ffffff', '#f1c40f']
                });
            } else {
                showScreen('fail-screen');
            }
        }

        function resetGameToStart() {
            showScreen('start-screen');
        }
    </script>
</body>
</html>
